<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Key Configuration (Local Storage)</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0d0e15 0%, #1a1c29 100%);
      --card-bg: rgba(22, 25, 41, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --accent-color: #6366f1;
      --accent-hover: #4f46e5;
      --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      --success-color: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 2.5rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }

    p.subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      text-align: center;
      margin-top: -0.5rem;
      line-height: 1.4;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 0.9rem 1.1rem;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      width: 100%;
    }

    input:focus {
      outline: none;
      border-color: var(--accent-color);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }

    .btn {
      background: var(--accent-gradient);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 1rem;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      box-shadow: none;
    }

    .status-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      padding: 0.6rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      margin-top: 0.5rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .dot-active {
      background: var(--success-color);
      box-shadow: 0 0 8px var(--success-color);
    }

    .dot-inactive {
      background: #9ca3af;
    }

    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--success-color);
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.9rem;
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>MCP Private API Keys</h1>
    <p class="subtitle">Set your private API keys locally. Keys are saved securely in your browser's Local Storage and injected dynamically into all frontend AI requests.</p>
    
    <div class="form-group">
      <label for="geminiKey">Gemini API Key</label>
      <input type="password" id="geminiKey" placeholder="AIzaSy...">
    </div>

    <div class="form-group">
      <label for="anthropicKey">Anthropic API Key</label>
      <input type="password" id="anthropicKey" placeholder="sk-ant-...">
    </div>

    <button class="btn" onclick="saveKeys()">Save Private Keys</button>
    <button class="btn btn-secondary" onclick="clearKeys()">Clear Stored Keys</button>

    <div class="status-badge" id="statusBox">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">No keys saved locally</span>
    </div>
  </div>

  <div id="toast">Keys saved successfully!</div>

  <script>
    // Load keys from Local Storage
    document.addEventListener("DOMContentLoaded", () => {
      const gemini = localStorage.getItem("GEMINI_API_KEY") || "";
      const anthropic = localStorage.getItem("ANTHROPIC_API_KEY") || "";
      
      document.getElementById("geminiKey").value = gemini;
      document.getElementById("anthropicKey").value = anthropic;
      
      updateStatus(gemini, anthropic);
    });

    function saveKeys() {
      const gemini = document.getElementById("geminiKey").value.trim();
      const anthropic = document.getElementById("anthropicKey").value.trim();

      if (gemini) {
        localStorage.setItem("GEMINI_API_KEY", gemini);
      } else {
        localStorage.removeItem("GEMINI_API_KEY");
      }

      if (anthropic) {
        localStorage.setItem("ANTHROPIC_API_KEY", anthropic);
      } else {
        localStorage.removeItem("ANTHROPIC_API_KEY");
      }

      updateStatus(gemini, anthropic);
      showToast("Keys updated successfully!");
    }

    function clearKeys() {
      localStorage.removeItem("GEMINI_API_KEY");
      localStorage.removeItem("ANTHROPIC_API_KEY");
      
      document.getElementById("geminiKey").value = "";
      document.getElementById("anthropicKey").value = "";
      
      updateStatus("", "");
      showToast("All stored keys cleared!");
    }

    function updateStatus(gemini, anthropic) {
      const dot = document.getElementById("statusDot");
      const text = document.getElementById("statusText");
      
      const hasGemini = !!gemini;
      const hasAnthropic = !!anthropic;

      if (hasGemini || hasAnthropic) {
        dot.className = "dot dot-active";
        const list = [];
        if (hasGemini) list.push("Gemini");
        if (hasAnthropic) list.push("Anthropic");
        text.textContent = `Local keys active: ${list.join(", ")}`;
      } else {
        dot.className = "dot dot-inactive";
        text.textContent = "No keys saved locally (using server defaults)";
      }
    }

    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.className = "show";
      setTimeout(() => {
        toast.className = "";
      }, 2500);
    }
  </script>

</body>
</html>
