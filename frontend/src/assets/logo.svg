<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Base Shield -->
  <path d="M 200 40 L 320 80 L 320 180 C 320 280 200 360 200 360 C 200 360 80 280 80 180 L 80 80 Z" fill="url(#shieldGrad)" />
  
  <!-- Outer Glass Frame (Shattered effect simulation) -->
  <path d="M 200 20 L 340 65 L 340 180 C 340 295 200 380 200 380 C 200 380 60 295 60 180 L 60 65 Z" fill="none" stroke="url(#glassGrad)" stroke-width="8" opacity="0.6"/>

  <!-- Brain Circuit Network -->
  <g stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8">
    <path d="M 200 100 L 200 150 L 150 200 M 200 150 L 250 200 M 150 200 L 110 200 L 110 240 M 250 200 L 290 200 M 200 200 L 200 300 M 200 250 L 260 250 M 150 200 L 150 260 M 250 200 L 250 140" />
  </g>

  <!-- Glowing Nodes -->
  <g fill="#10b981" filter="url(#glow)">
    <circle cx="200" cy="100" r="6" />
    <circle cx="200" cy="150" r="4" />
    <circle cx="150" cy="200" r="6" />
    <circle cx="250" cy="200" r="6" />
    <circle cx="110" cy="200" r="4" />
    <circle cx="110" cy="240" r="6" />
    <circle cx="290" cy="200" r="5" />
    <circle cx="200" cy="250" r="5" />
    <circle cx="260" cy="250" r="5" />
    <circle cx="150" cy="260" r="6" />
    <circle cx="250" cy="140" r="5" />
    <circle cx="200" cy="300" r="6" />
  </g>
</svg>
