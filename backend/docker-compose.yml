version: '3.8'

services:
  neo4j:
    image: neo4j:5.12.0
    container_name: insurance_neo4j
    ports:
      - "7474:7474" # HTTP UI
      - "7687:7687" # Bolt Protocol
    environment:
      - NEO4J_AUTH=neo4j/password
      # Optional: To disable auth for purely local testing, you can use:
      # - NEO4J_AUTH=none
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
