services:
  - type: web
    name: insuragent-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/scripts/seed_demo_users.py && PYTHONPATH=backend uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: InsuranceAISystem
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        sync: false
