services:
  - type: web
    name: insuragent-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/scripts/seed_demo_users.py && python backend/scripts/seed_realistic_claims.py && PYTHONPATH=backend uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    # Persistent disk: survives redeploys — stores uploaded claim documents and SQLite DB
    disk:
      name: insuragent-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: APP_NAME
        value: InsuranceAISystem
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        sync: false
      # Point uploads to the persistent disk mount
      - key: UPLOAD_DIR
        value: /data/uploads
